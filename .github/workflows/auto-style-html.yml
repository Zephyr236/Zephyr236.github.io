name: Auto Style HTML Articles

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  process-html-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Process HTML files
        run: |
          for file in $(find . -name "*.html" -not -path "./.git/*" -not -path "./_layouts/*"); do
            # Check if file already has Jekyll front matter
            if ! grep -q '^---' "$file"; then
              # Extract title from <title> tag
              title=$(grep -oP '(?<=<title>).*(?=</title>)' "$file" | head -1)
              if [ -z "$title" ]; then
                title=$(basename "$file" .html)
              fi

              # Extract body content only (between <body> and </body>)
              body_content=$(sed -n '/<body>/,/<\/body>/p' "$file" | sed '1d;$d')

              # Create temp file with front matter and body content only
              temp_file=$(mktemp)
              echo "---" > "$temp_file"
              echo "layout: typora" >> "$temp_file"
              echo "title: $title" >> "$temp_file"
              echo "---" >> "$temp_file"
              echo "$body_content" >> "$temp_file"

              # Replace original file
              mv "$temp_file" "$file"
              echo "Processed: $file"
            else
              echo "Skipping (already has front matter): $file"
            fi
          done

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: Process HTML articles for Jekyll"
          git push
