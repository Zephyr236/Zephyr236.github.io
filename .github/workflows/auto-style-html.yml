name: Auto Style HTML Articles

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  process-html-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Process HTML files
        run: |
          python3 << 'EOF'
          import os
          import re

          for root, dirs, files in os.walk('.'):
            # Skip certain directories
            if '.git' in root or '_layouts' in root:
              continue
            for filename in files:
              if filename.endswith('.html'):
                filepath = os.path.join(root, filename)
                with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()

                # Skip if already has front matter
                if content.startswith('---'):
                  print(f"Skipping (has front matter): {filepath}")
                  continue

                # Extract title
                title_match = re.search(r'<title>(.*?)</title>', content)
                title = title_match.group(1) if title_match else os.path.splitext(filename)[0]

                # Extract body content
                body_match = re.search(r'<body[^>]*>(.*?)</body>', content, re.DOTALL)
                body_content = body_match.group(1) if body_match else content

                # Create new file with front matter
                new_content = f'''---
layout: typora
title: {title}
---

{body_content}'''

                with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(new_content)
                print(f"Processed: {filepath}")
          EOF

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: Process HTML articles for Jekyll"
          git push
