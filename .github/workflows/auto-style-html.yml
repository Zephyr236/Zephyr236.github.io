name: Auto Style HTML Articles

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  inject-standalone-class:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Inject standalone class
        run: |
          for file in $(find . -name "*.html" -not -path "./.git/*" -not -path "./_layouts/*"); do
            if ! grep -q 'class="standalone"' "$file" && grep -q '<body>' "$file"; then
              sed -i 's/<body>/<body class="standalone">/g' "$file"
              echo "Updated: $file"
            fi
          done

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: Add standalone class"
          git push
